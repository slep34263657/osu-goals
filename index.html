<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>osu! score goals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">

<style>
</style>
</head>

<body>

<header>
  <div class="wordmark">osu<em>!</em> goals</div>
  <div class="header-right">
    <div class="avatar-wrap">
      <img id="hdr-avatar">
      <span class="avatar-name" id="hdr-name"></span>
    </div>
    <button class="btn-ghost" onclick="toggleCfg()">config</button>
    <button class="btn-ghost pink" id="auth-btn" onclick="handleAuth()">sign in with osu!</button>
  </div>
</header>

<!-- CONFIG () -->
<div id="cfg-drawer">
  <div class="fg">
    <label>CF URL</label>
    <input id="cfg-worker" type="text" placeholder="-------" oninput="saveCfg()">
  </div>
  <div class="cfg-note">
  </div>
</div>

<div class="toolbar">
  <div class="tab-row">
    <button class="tab active" id="tab-g" onclick="setTab('g')">Goals</button>
    <button class="tab" id="tab-c" onclick="setTab('c')">Completed</button>
  </div>
  <div class="toolbar-gap"></div>
  <span class="stat-pill" id="stat-pill"></span>
</div>

<div class="page">
  <div class="grid" id="g-grid"></div>
  <div id="completed-wrap" style="display:none">
    <div class="sec-head">completed</div>
    <div class="grid" id="c-grid"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <button class="x-btn" onclick="closeOverlay('add-overlay')">✕</button>

    <div class="modal-hd">add map goal</div>

    <div class="fg">
      <label>Beatmap URL</label>
      <input id="f-url" oninput="onUrlInput(this.value)">
      <div class="fetch-msg" id="f-status"></div>
    </div>

    <div class="three">
      <div class="fg"><label>ACC</label><input id="f-acc"></div>
      <div class="fg"><label>GRADE</label><input id="f-grade"></div>
      <div class="fg"><label>PP</label><input id="f-pp"></div>
    </div>

    <div class="fg">
      <label>Importance</label>
      <input type="range" id="f-imp" min="1" max="10" value="5">
    </div>

    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeOverlay('add-overlay')">cancel</button>
      <button class="btn-fill" onclick="saveGoal()">save</button>
    </div>
  </div>
</div>

<script>

// ── CONFIG ──
const CFG_KEY = "cfg";
const SESS_KEY = "sess";

function loadCfg() {
  return JSON.parse(localStorage.getItem(CFG_KEY) || "{}");
}
function saveCfg() {
  localStorage.setItem(CFG_KEY, JSON.stringify({
    worker: document.getElementById("cfg-worker").value.trim().replace(/\/+$/, "")
  }));
}
function applyCfg() {
  const c = loadCfg();
  document.getElementById("cfg-worker").value = c.worker || "";
}
function worker() {
  return loadCfg().worker;
}
function toggleCfg() {
  document.getElementById("cfg-drawer").classList.toggle("open");
}

// ── OSU AUTH  ──
function handleAuth() {
  const w = worker();
  if (!w) return alert("set worker first");
  location.href = `${w}/login`;
}

// ── MAP FETCH  ──
function parseBmId(url) {
  return (url.match(/beatmapsets\/\d+#\w+\/(\d+)/)?.[1])
      || (url.match(/beatmaps\/(\d+)/)?.[1])
      || (url.match(/[?&]b=(\d+)/)?.[1]);
}

async function fetchMeta(url) {
  const id = parseBmId(url);
  if (!id) return null;

  const w = worker();
  if (!w) return null;

  try {
    const r = await fetch(`${w}/beatmap?id=${id}`);
    if (!r.ok) return null;
    return await r.json();
  } catch {
    return null;
  }
}

// ── INPUT ──
let timer;
let pendingMeta;

function onUrlInput(v) {
  clearTimeout(timer);
  if (!v.trim()) return;

  setStatus("loading...");
  timer = setTimeout(async () => {
    const meta = await fetchMeta(v);
    if (!meta) return setStatus("failed to fetch", true);

    pendingMeta = meta;
    setStatus(meta.title, false, true);
  }, 400);
}

function setStatus(msg, err=false, ok=false) {
  const el = document.getElementById("f-status");
  el.textContent = msg;
  el.style.color = err ? "#e05c5c" : ok ? "#6bdb8f" : "#808080";
}

// ── GOALS ──
let goals = [];

async function saveGoal() {
  const url = document.getElementById("f-url").value;

  if (pendingMeta) {
    goals.push({
      id: Date.now(),
      url,
      ...pendingMeta,
      importance: +document.getElementById("f-imp").value
    });
  }

  localStorage.setItem("goals", JSON.stringify(goals));
  render();
  closeOverlay("add-overlay");
}

// ── RENDER ──
function render() {
  const g = document.getElementById("g-grid");
  g.innerHTML = goals.map(x =>
    `<div class="card">
      <div class="card-body">
        <div class="card-title">${x.title}</div>
        <div class="card-artist">${x.artist || ""}</div>
      </div>
    </div>`
  ).join("");
}

// ── INIT ──
applyCfg();
goals = JSON.parse(localStorage.getItem("goals") || "[]");
render();

</script>
</body>
</html>
