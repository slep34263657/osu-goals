<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>osu! score goals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #181818;
  --bg2:         #202020;
  --bg3:         #282828;
  --border:      #2e2e2e;
  --border2:     #383838;
  --text:        #e4e4e4;
  --dim:         #808080;
  --dimmer:      #484848;
  --pink:        #ff6b9d;
  --pink-bg:     rgba(255,107,157,0.1);
  --green:       #6bdb8f;
  --red:         #e05c5c;
  --mono:        'DM Mono', monospace;
  --sans:        'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ─────────────────────────────────────────────────────────── */
header {
  height: 56px;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
}
.wordmark {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
}
.wordmark em { font-style: normal; color: var(--pink); }

.header-right { display: flex; align-items: center; gap: 0.75rem; }


.btn-ghost {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--border2);
  color: var(--dim);
  padding: 0.4rem 0.85rem;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn-ghost:hover { border-color: var(--dim); color: var(--text); }
.btn-ghost.pink { border-color: color-mix(in srgb, var(--pink) 40%, transparent); color: var(--pink); }
.btn-ghost.pink:hover { border-color: var(--pink); }


/* ── TOOLBAR ────────────────────────────────────────────────────────── */
.toolbar {
  height: 48px;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  border-bottom: 1px solid var(--border);
}
.tab-row { display: flex; }
.tab {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--border);
  border-right: none;
  color: var(--dimmer);
  padding: 0.35rem 0.9rem;
  cursor: pointer;
  transition: all 0.12s;
}
.tab:last-child { border-right: 1px solid var(--border); }
.tab.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.tab:hover:not(.active) { color: var(--dim); }

.toolbar-gap { flex: 1; }
.stat-pill {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--dimmer);
}
.stat-pill b { color: var(--dim); font-weight: 400; }

.add-btns { display: none; gap: 0.5rem; }
body.authed .add-btns { display: flex; }

/* ── GRID ───────────────────────────────────────────────────────────── */
.page { padding: 1.75rem 2rem 4rem; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.25rem;
}
.sec-head {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dimmer);
  padding-bottom: 1rem;
  margin-bottom: 0;
}
#completed-wrap { margin-top: 2.5rem; }

/* ── CARD ───────────────────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color 0.15s, transform 0.15s;
}
.card:hover { border-color: var(--border2); }

/* 16:9 image area with letterboxing */
.card-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #0a0a0a;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.card-thumb-img {
  position: absolute; inset: 0;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 0.2s;
}
.card:hover .card-thumb-img { opacity: 0.9; }
/* no cover — subtle pattern */
.card-thumb-empty {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 12px,
    rgba(255,255,255,0.018) 12px,
    rgba(255,255,255,0.018) 13px
  );
}
/* overlay bar at top of thumb for imp badge + tools */
.card-thumb-overlay {
  position: absolute; inset: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 0.55rem 0.6rem;
  background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 50%);
  pointer-events: none;
}
.card-thumb-overlay > * { pointer-events: auto; }

.card-body {
  padding: 0.85rem 1rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  flex: 1;
}

.card-titles { min-width: 0; }
.card-title {
  font-size: 0.82rem;
  font-weight: 400;
  color: var(--text);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
  text-decoration: none;
  transition: color 0.12s;
}
.card-title:hover { color: var(--pink); }
.card-artist {
  font-size: 0.68rem;
  color: var(--dim);
  margin-top: 0.15rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.imp {
  font-family: var(--mono);
  font-size: 0.62rem;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.55);
  color: rgba(255,255,255,0.7);
  padding: 0.15rem 0.4rem;
  flex-shrink: 0;
  line-height: 1.4;
}
.imp.hi { border-color: rgba(255,107,157,0.6); color: var(--pink); }
.imp.md { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }

.card-diff {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--dim);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.stars { color: var(--dimmer); }
.stars b { color: #f5c518; font-weight: 400; }
.mod-tag {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.06em;
  padding: 0.1rem 0.35rem;
  background: rgba(255,200,50,0.1);
  border: 1px solid rgba(255,200,50,0.25);
  color: #f5c518;
}

.chips { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: auto; padding-top: 0.35rem; }
.chip {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.03em;
  padding: 0.25rem 0.55rem;
  border: 1px solid var(--border2);
  color: var(--dim);
  background: rgba(255,255,255,0.015);
  white-space: nowrap;
}
.chip.done { border-color: rgba(107,219,143,0.4); color: var(--green); background: rgba(107,219,143,0.07); }
.chip.partial { border-color: rgba(245,197,24,0.35); color: #f5c518; background: rgba(245,197,24,0.06); }
.chip.empty { color: var(--dimmer); border-color: var(--border); font-style: italic; }

.partial-tag {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.06em;
  padding: 0.1rem 0.35rem;
  background: rgba(245,197,24,0.08);
  border: 1px solid rgba(245,197,24,0.3);
  color: #f5c518;
}

.card-note {
  font-size: 0.67rem;
  color: var(--dimmer);
  font-style: italic;
  line-height: 1.4;
}

/* card edit/delete — only visible when authed + hovering */
.card-tools {
  display: none;
  gap: 0.25rem;
}
body.authed .card:hover .card-thumb-overlay .card-tools { display: flex; }
.card-tool {
  font-family: var(--mono);
  font-size: 0.58rem;
  background: rgba(24,24,24,0.85);
  border: 1px solid var(--border2);
  color: var(--dim);
  padding: 0.25rem 0.5rem;
  cursor: pointer;
  transition: all 0.12s;
  backdrop-filter: blur(4px);
}
.card-tool:hover { color: var(--text); border-color: var(--dim); }
.card-tool.x:hover { color: var(--red); border-color: var(--red); }

.empty {
  grid-column: 1/-1;
  padding: 3.5rem 1rem;
  text-align: center;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--dimmer);
  letter-spacing: 0.08em;
}

/* ── MODAL ──────────────────────────────────────────────────────────── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  width: 100%;
  max-width: 500px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 1.75rem;
  position: relative;
}
.modal-hd {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 1.5rem;
}
.x-btn {
  position: absolute;
  top: 1.1rem; right: 1.1rem;
  background: none; border: none;
  color: var(--dimmer); font-size: 0.9rem;
  cursor: pointer; font-family: var(--mono);
  transition: color 0.12s;
}
.x-btn:hover { color: var(--text); }

/* form */
.fg { margin-bottom: 1.1rem; }
.fg:last-of-type { margin-bottom: 0; }
label {
  display: block;
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dimmer);
  margin-bottom: 0.45rem;
}
label .opt { color: var(--dimmer); opacity: 0.6; font-size: 0.52rem; letter-spacing: 0; text-transform: none; }
input[type=text], input[type=password], textarea, select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 0.6rem 0.7rem;
  outline: none;
  transition: border-color 0.12s;
  appearance: none;
}
input:focus, textarea:focus { border-color: var(--border2); }
input:disabled { opacity: 0.45; }
textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
.three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }

.imp-row { display: flex; align-items: center; gap: 0.85rem; }
.imp-row input[type=range] {
  flex: 1; padding: 0; background: none; border: none;
  cursor: pointer; accent-color: var(--pink);
}
.imp-val { font-family: var(--mono); font-size: 0.82rem; color: var(--text); width: 1.2rem; text-align: center; }

.preview-box {
  display: none;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 0.75rem;
  margin-top: 0.6rem;
  gap: 0.7rem;
  align-items: center;
}
.preview-box.show { display: flex; }
.preview-box img { width: 68px; height: 44px; object-fit: cover; flex-shrink: 0; }
.preview-info .pt { font-size: 0.75rem; color: var(--text); }
.preview-info .ps { font-family: var(--mono); font-size: 0.63rem; color: var(--dim); margin-top: 0.2rem; }

.fetch-msg {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--dimmer);
  margin-top: 0.35rem;
  min-height: 1em;
}
.fetch-msg.ok { color: var(--green); }
.fetch-msg.err { color: var(--red); }

.check-row { display: flex; align-items: center; gap: 0.6rem; }
.check-row input[type=checkbox] { width: 13px; height: 13px; accent-color: var(--pink); cursor: pointer; }
.check-row label { margin: 0; cursor: pointer; }

.modal-foot { display: flex; gap: 0.6rem; margin-top: 1.5rem; }
.btn-fill {
  flex: 1;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--text);
  border: 1px solid var(--text);
  color: var(--bg);
  padding: 0.6rem 1rem;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.btn-fill:hover { background: var(--pink); border-color: var(--pink); }
.btn-fill:disabled { opacity: 0.35; cursor: not-allowed; }

.bulk-hint {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--dimmer);
  line-height: 1.65;
  margin-bottom: 1rem;
}

/* ── SPINNER ────────────────────────────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }
.sp {
  display: inline-block;
  width: 9px; height: 9px;
  border: 1px solid var(--border2);
  border-top-color: var(--dim);
  border-radius: 50%;
  animation: spin 0.55s linear infinite;
  vertical-align: middle;
  margin-right: 0.3rem;
}

/* ── TOAST ──────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 1.75rem; right: 1.75rem;
  background: var(--bg3);
  border: 1px solid var(--border2);
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.06em;
  color: var(--dim);
  padding: 0.65rem 1rem;
  z-index: 999;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.18s;
  pointer-events: none;
  max-width: 280px;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.ok  { border-color: rgba(107,219,143,0.5); color: var(--green); }
#toast.err { border-color: rgba(224,92,92,0.5);   color: var(--red);   }


@media (max-width: 600px) {
  header, .toolbar, .page { padding-left: 1rem; padding-right: 1rem; }
  .three { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────────────────────────── -->
<header>
  <div class="wordmark">osu<em>!</em> goals</div>
  <div class="header-right">
    <div id="avatar-wrap" style="display:none"></div>
    <button class="btn-ghost pink" id="auth-btn" onclick="handleAuth()">login</button>
  </div>
</header>



<!-- ── TOOLBAR ────────────────────────────────────────────────────────────── -->
<div class="toolbar">
  <div class="tab-row">
    <button class="tab active" id="tab-g" onclick="setTab('g')">Goals</button>
    <button class="tab" id="tab-c" onclick="setTab('c')">Completed</button>
  </div>
  <div class="toolbar-gap"></div>
  <span class="stat-pill" id="stat-pill"></span>
  <div class="add-btns">
    <button class="btn-ghost" onclick="openAdd()">+ add map</button>
    <button class="btn-ghost" onclick="openBulk()">+ bulk add</button>
  </div>
</div>

<!-- ── MAIN ───────────────────────────────────────────────────────────────── -->
<div class="page">
  <div class="grid" id="g-grid"></div>
  <div id="completed-wrap" style="display:none">
    <div class="sec-head">completed</div>
    <div class="grid" id="c-grid"></div>
  </div>
</div>

<!-- ── ADD / EDIT MODAL ───────────────────────────────────────────────────── -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <button class="x-btn" onclick="closeOverlay('add-overlay')">✕</button>
    <div class="modal-hd" id="add-hd">add map goal</div>

    <div class="fg">
      <label>Beatmap URL</label>
      <input id="f-url" type="text" placeholder="https://osu.ppy.sh/beatmapsets/…#osu/…" oninput="onUrlInput(this.value)">
      <div class="fetch-msg" id="f-status"></div>
    </div>

    <div class="preview-box" id="f-preview">
      <img id="f-prev-img" src="" alt="">
      <div class="preview-info">
        <div class="pt" id="f-prev-title"></div>
        <div class="ps" id="f-prev-sub"></div>
      </div>
    </div>

    <div class="three" style="margin-top:1.1rem">
      <div class="fg">
        <label>Target ACC <span class="opt">(optional)</span></label>
        <input id="f-acc" type="text" placeholder="99.5%" oninput="if(document.getElementById('f-done').checked) updatePartialLabels()">
      </div>
      <div class="fg">
        <label>Grade <span class="opt">(optional)</span></label>
        <input id="f-grade" type="text" placeholder="SS" oninput="if(document.getElementById('f-done').checked) updatePartialLabels()">
      </div>
      <div class="fg">
        <label>Target PP <span class="opt">(optional)</span></label>
        <input id="f-pp" type="text" placeholder="420pp" oninput="if(document.getElementById('f-done').checked) updatePartialLabels()">
      </div>
    </div>

    <div class="three">
      <div class="fg">
        <label>Mods <span class="opt">(optional)</span></label>
        <input id="f-mods" type="text" placeholder="HDHR" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="fg">
        <label>Mod SR <span class="opt">(optional)</span></label>
        <input id="f-modsr" type="text" placeholder="e.g. 7.43">
      </div>
      <div class="fg" style="display:flex;align-items:flex-end">
        <span style="font-family:var(--mono);font-size:0.55rem;color:var(--dimmer);line-height:1.5;padding-bottom:0.7rem">Enter adjusted SR manually — use a SR calculator for your mods</span>
      </div>
    </div>

    <div class="fg">
      <label>Importance (1–10)</label>
      <div class="imp-row">
        <input type="range" id="f-imp" min="1" max="10" value="5"
               oninput="document.getElementById('f-imp-val').textContent=this.value">
        <span class="imp-val" id="f-imp-val">5</span>
      </div>
    </div>

    <div class="fg">
      <label>Notes <span class="opt">(optional)</span></label>
      <input id="f-notes" type="text" placeholder="e.g. need better approach rate">
    </div>

    <div class="check-row">
      <input type="checkbox" id="f-done" onchange="togglePartialFields()">
      <label for="f-done">mark as achieved / completed</label>
    </div>

    <div id="f-partial-wrap" style="display:none;margin-top:0.85rem;padding:0.85rem;background:var(--bg3);border:1px solid var(--border)">
      <div style="font-family:var(--mono);font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dimmer);margin-bottom:0.75rem">which goals were hit?</div>
      <div style="display:flex;flex-direction:column;gap:0.5rem" id="f-partial-fields">
        <div class="check-row" id="f-partial-acc-row">
          <input type="checkbox" id="f-achieved-acc" checked>
          <label for="f-achieved-acc" id="f-partial-acc-label">ACC —</label>
        </div>
        <div class="check-row" id="f-partial-grade-row">
          <input type="checkbox" id="f-achieved-grade" checked>
          <label for="f-achieved-grade" id="f-partial-grade-label">GRADE —</label>
        </div>
        <div class="check-row" id="f-partial-pp-row">
          <input type="checkbox" id="f-achieved-pp" checked>
          <label for="f-achieved-pp" id="f-partial-pp-label">PP —</label>
        </div>
      </div>
    </div>

    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeOverlay('add-overlay')">cancel</button>
      <button class="btn-fill" id="f-save-btn" onclick="saveGoal()">save goal</button>
    </div>
  </div>
</div>

<!-- ── BULK MODAL ────────────────────────────────────────────────────────── -->
<div class="overlay" id="bulk-overlay">
  <div class="modal">
    <button class="x-btn" onclick="closeOverlay('bulk-overlay')">✕</button>
    <div class="modal-hd">bulk add maps</div>
    <p class="bulk-hint">One osu! beatmap URL per line. Metadata is fetched automatically.<br>Duplicates are skipped.</p>
    <div class="fg">
      <label>URLs (one per line)</label>
      <textarea id="bulk-ta" placeholder="https://osu.ppy.sh/beatmapsets/123456#osu/789012&#10;https://osu.ppy.sh/beatmapsets/..."></textarea>
    </div>
    <div class="fetch-msg" id="bulk-status"></div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeOverlay('bulk-overlay')">cancel</button>
      <button class="btn-fill" id="bulk-btn" onclick="doBulk()">import</button>
    </div>
  </div>
</div>

<!-- ── LOGIN MODAL ────────────────────────────────────────────────────────── -->
<div class="overlay" id="login-overlay">
  <div class="modal" style="max-width:320px">
    <button class="x-btn" onclick="closeOverlay('login-overlay')">✕</button>
    <div class="modal-hd">login</div>
    <div class="fg">
      <label>Password</label>
      <input id="pw-input" type="password" placeholder="password" autocomplete="current-password">
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeOverlay('login-overlay')">cancel</button>
      <button class="btn-fill" id="login-submit-btn" onclick="submitLogin()">sign in</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const WORKER  = 'https://slep-osu-goals.sl3pgg.workers.dev';
const TOK_KEY = 'osugoals_token';

// ── AUTH ──────────────────────────────────────────────────────────────────────
let authToken = localStorage.getItem(TOK_KEY) || null;

function applyAuthUI() {
  const authed = !!authToken;
  document.body.classList.toggle('authed', authed);
  const btn = document.getElementById('auth-btn');
  btn.textContent = authed ? 'sign out' : 'login';
  btn.classList.toggle('pink', !authed);
  document.getElementById('avatar-wrap').style.display = 'none'; // no avatar with password login
}

function handleAuth() {
  if (authToken) {
    authToken = null;
    localStorage.removeItem(TOK_KEY);
    applyAuthUI();
    toast('signed out');
  } else {
    openLoginModal();
  }
}

async function doLogin(password) {
  const r = await fetch(`${WORKER}/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password }),
  });
  const d = await r.json();
  if (!r.ok || !d.token) {
    toast(d.error || 'wrong password', 'err');
    return false;
  }
  authToken = d.token;
  localStorage.setItem(TOK_KEY, authToken);
  applyAuthUI();
  toast('signed in', 'ok');
  return true;
}

function openLoginModal() {
  document.getElementById('pw-input').value = '';
  document.getElementById('login-overlay').classList.add('open');
  setTimeout(() => document.getElementById('pw-input').focus(), 50);
}

async function submitLogin() {
  const pw  = document.getElementById('pw-input').value;
  const btn = document.getElementById('login-submit-btn');
  btn.disabled = true;
  const ok = await doLogin(pw);
  btn.disabled = false;
  if (ok) closeOverlay('login-overlay');
}

// ── DATA ──────────────────────────────────────────────────────────────────────
let goals = [];

async function fetchGoals() {
  try {
    const r = await fetch(`${WORKER}/goals?t=${Date.now()}`, { cache: 'no-store' });
    if (r.ok) {
      const d = await r.json();
      goals = d.goals || [];
    }
  } catch {
    goals = [];
  }
}

async function apiUpdate(action, payload) {
  const r = await fetch(`${WORKER}/update`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, token: authToken, ...payload }),
  });
  const d = await r.json().catch(() => ({}));
  if (!r.ok) {
    if (r.status === 401) {
      // token expired — force re-login
      authToken = null;
      localStorage.removeItem(TOK_KEY);
      applyAuthUI();
      toast('session expired — please log in again', 'err');
    } else {
      toast(d.error || 'save failed', 'err');
    }
    return false;
  }
  toast('saved', 'ok');
  return true;
}

// ── MAP METADATA ──────────────────────────────────────────────────────────────
function parseBmId(url) {
  const m1 = url.match(/beatmapsets\/\d+#\w+\/(\d+)/);
  if (m1) return m1[1];
  const m2 = url.match(/beatmaps\/(\d+)/);
  if (m2) return m2[1];
  const m3 = url.match(/[?&]b=(\d+)/);
  if (m3) return m3[1];
  return null;
}

async function fetchMeta(url) {
  const id = parseBmId(url);
  if (!id) return null;
  try {
    const r = await fetch(`${WORKER}/beatmap?id=${id}`);
    if (!r.ok) return { id, title: `map #${id}`, artist: '', diff: '', stars: null, cover: null, url };
    const d = await r.json();
    if (d.error) return { id, title: `map #${id}`, artist: '', diff: '', stars: null, cover: null, url };
    return { ...d, url };
  } catch {
    return { id, title: `map #${id}`, artist: '', diff: '', stars: null, cover: null, url };
  }
}

// ── URL INPUT ─────────────────────────────────────────────────────────────────
let urlTimer = null;
let pendingMeta = null;

function onUrlInput(val) {
  clearTimeout(urlTimer);
  setFetchMsg('');
  document.getElementById('f-preview').classList.remove('show');
  pendingMeta = null;
  if (!val.trim()) return;
  setFetchMsg('<span class="sp"></span>fetching…');
  urlTimer = setTimeout(async () => {
    const meta = await fetchMeta(val.trim());
    if (!meta) {
      setFetchMsg('could not fetch map — check url', 'err');
    } else {
      pendingMeta = meta;
      setFetchMsg('✓ ' + meta.title, 'ok');
      document.getElementById('f-prev-title').textContent = meta.title + (meta.diff ? ' [' + meta.diff + ']' : '');
      document.getElementById('f-prev-sub').textContent   = meta.artist + (meta.stars ? '  ·  ★' + meta.stars : '');
      if (meta.cover) {
        document.getElementById('f-prev-img').src = meta.cover;
        document.getElementById('f-preview').classList.add('show');
      }
    }
  }, 550);
}
function setFetchMsg(html, cls) {
  const el = document.getElementById('f-status');
  el.innerHTML = html;
  el.className = 'fetch-msg' + (cls ? ' ' + cls : '');
}

// ── PARTIAL COMPLETION ────────────────────────────────────────────────────────
function togglePartialFields() {
  const done = document.getElementById('f-done').checked;
  document.getElementById('f-partial-wrap').style.display = done ? '' : 'none';
  if (done) updatePartialLabels();
}

function updatePartialLabels() {
  const acc   = document.getElementById('f-acc').value.trim();
  const grade = document.getElementById('f-grade').value.trim();
  const pp    = document.getElementById('f-pp').value.trim();
  document.getElementById('f-partial-acc-row').style.display   = acc   ? '' : 'none';
  document.getElementById('f-partial-grade-row').style.display = grade ? '' : 'none';
  document.getElementById('f-partial-pp-row').style.display    = pp    ? '' : 'none';
  if (acc)   document.getElementById('f-partial-acc-label').textContent   = 'ACC ' + acc;
  if (grade) document.getElementById('f-partial-grade-label').textContent = 'GRADE ' + grade;
  if (pp)    document.getElementById('f-partial-pp-label').textContent    = 'PP ' + pp;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
let editId = null;

function openAdd() {
  editId = null; pendingMeta = null;
  document.getElementById('add-hd').textContent = 'add map goal';
  document.getElementById('f-url').value = '';
  document.getElementById('f-url').disabled = false;
  document.getElementById('f-status').textContent = '';
  document.getElementById('f-preview').classList.remove('show');
  document.getElementById('f-acc').value   = '';
  document.getElementById('f-grade').value = '';
  document.getElementById('f-pp').value    = '';
  document.getElementById('f-mods').value  = '';
  document.getElementById('f-modsr').value = '';
  document.getElementById('f-imp').value   = 5;
  document.getElementById('f-imp-val').textContent = '5';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-done').checked = false;
  document.getElementById('f-partial-wrap').style.display = 'none';
  document.getElementById('f-achieved-acc').checked   = true;
  document.getElementById('f-achieved-grade').checked = true;
  document.getElementById('f-achieved-pp').checked    = true;
  document.getElementById('add-overlay').classList.add('open');
}

function openEdit(id) {
  const g = goals.find(x => x.id === id);
  if (!g) return;
  editId = id;
  pendingMeta = { title: g.title, artist: g.artist, diff: g.diff, stars: g.stars, cover: g.cover, url: g.url };
  document.getElementById('add-hd').textContent = 'edit goal';
  document.getElementById('f-url').value = g.url;
  document.getElementById('f-url').disabled = true;
  setFetchMsg('✓ ' + g.title, 'ok');
  if (g.cover) {
    document.getElementById('f-prev-img').src = g.cover;
    document.getElementById('f-prev-title').textContent = g.title + (g.diff ? ' [' + g.diff + ']' : '');
    document.getElementById('f-prev-sub').textContent   = g.artist + (g.stars ? '  ·  ★' + g.stars : '');
    document.getElementById('f-preview').classList.add('show');
  } else {
    document.getElementById('f-preview').classList.remove('show');
  }
  document.getElementById('f-acc').value   = g.goalAcc   || '';
  document.getElementById('f-grade').value = g.goalGrade || '';
  document.getElementById('f-pp').value    = g.goalPp    || '';
  document.getElementById('f-mods').value  = g.mods      || '';
  document.getElementById('f-modsr').value = g.modSr     || '';
  document.getElementById('f-imp').value   = g.importance || 5;
  document.getElementById('f-imp-val').textContent = g.importance || 5;
  document.getElementById('f-notes').value = g.notes || '';
  document.getElementById('f-done').checked = !!g.achieved;
  document.getElementById('f-achieved-acc').checked   = g.achievedAcc   !== false;
  document.getElementById('f-achieved-grade').checked = g.achievedGrade !== false;
  document.getElementById('f-achieved-pp').checked    = g.achievedPp    !== false;
  togglePartialFields();
  document.getElementById('add-overlay').classList.add('open');
}

function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

async function saveGoal() {
  const btn = document.getElementById('f-save-btn');
  btn.disabled = true; btn.textContent = 'saving…';

  const url   = document.getElementById('f-url').value.trim();
  const acc   = document.getElementById('f-acc').value.trim();
  const grade = document.getElementById('f-grade').value.trim();
  const pp    = document.getElementById('f-pp').value.trim();
  const mods  = document.getElementById('f-mods').value.trim().toUpperCase();
  const modSr = document.getElementById('f-modsr').value.trim();
  const imp   = parseInt(document.getElementById('f-imp').value);
  const notes = document.getElementById('f-notes').value.trim();
  const done         = document.getElementById('f-done').checked;
  const achievedAcc   = !done ? false : document.getElementById('f-achieved-acc').checked;
  const achievedGrade = !done ? false : document.getElementById('f-achieved-grade').checked;
  const achievedPp    = !done ? false : document.getElementById('f-achieved-pp').checked;

  if (!editId && !url) {
    toast('enter a map url', 'err');
    btn.disabled = false; btn.textContent = 'save goal';
    return;
  }

  if (editId) {
    const g = goals.find(x => x.id === editId);
    if (!g) { btn.disabled = false; btn.textContent = 'save goal'; return; }
    const updated = { ...g, goalAcc: acc, goalGrade: grade, goalPp: pp, mods, modSr, importance: imp, notes, achieved: done, achievedAcc, achievedGrade, achievedPp };
    const ok = await apiUpdate('edit', { goal: updated });
    if (ok) {
      const idx = goals.findIndex(x => x.id === editId);
      if (idx !== -1) goals[idx] = updated;
    }
  } else {
    if (goals.find(g => g.url === url)) {
      toast('map already in list', 'err');
      btn.disabled = false; btn.textContent = 'save goal';
      return;
    }
    let meta = pendingMeta;
    if (!meta) meta = await fetchMeta(url) || { title: url, artist: '', diff: '', stars: null, cover: null, url };
    const newGoal = {
      ...meta,
      id: 'g' + Date.now(),
      url,
      goalAcc: acc, goalGrade: grade, goalPp: pp, mods, modSr,
      importance: imp, notes,
      achieved: done, achievedAcc, achievedGrade, achievedPp,
      addedAt: Date.now(),
    };
    const ok = await apiUpdate('add', { goal: newGoal });
    if (ok) goals.push(newGoal);
  }

  render();
  closeOverlay('add-overlay');
  btn.disabled = false; btn.textContent = 'save goal';
}

async function delGoal(id) {
  if (!confirm('remove this goal?')) return;
  const ok = await apiUpdate('delete', { id });
  if (ok) {
    goals = goals.filter(g => g.id !== id);
    render();
  }
}

async function doBulk() {
  const urls = document.getElementById('bulk-ta').value
    .split('\n').map(u => u.trim()).filter(Boolean);
  if (!urls.length) return;

  const btn = document.getElementById('bulk-btn');
  const st  = document.getElementById('bulk-status');
  btn.disabled = true;
  let added = 0, skipped = 0;

  for (let i = 0; i < urls.length; i++) {
    const u = urls[i];
    st.innerHTML = `<span class="sp"></span>fetching ${i + 1} / ${urls.length}`;
    st.className = 'fetch-msg';
    if (goals.find(g => g.url === u)) { skipped++; continue; }
    const meta = await fetchMeta(u) || { title: u, artist: '', diff: '', stars: null, cover: null, url: u };
    const newGoal = { ...meta, id: 'g' + Date.now() + i, url: u, goalAcc: '', goalGrade: '', goalPp: '', mods: '', modSr: '', importance: 5, achieved: false, addedAt: Date.now() };
    const ok = await apiUpdate('add', { goal: newGoal });
    if (ok) { goals.push(newGoal); added++; }
    await new Promise(r => setTimeout(r, 250));
  }

  render();
  closeOverlay('bulk-overlay');
  toast(`added ${added}${skipped ? ', skipped ' + skipped + ' duplicates' : ''}`, 'ok');
  btn.disabled = false;
  document.getElementById('bulk-ta').value = '';
  st.textContent = '';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
let tab = 'g';
function setTab(t) {
  tab = t;
  document.getElementById('tab-g').classList.toggle('active', t === 'g');
  document.getElementById('tab-c').classList.toggle('active', t === 'c');
  render();
}

function isFullyAchieved(g) {
  if (!g.achieved) return false;
  if (g.goalAcc   && g.achievedAcc   === false) return false;
  if (g.goalGrade && g.achievedGrade === false) return false;
  if (g.goalPp    && g.achievedPp    === false) return false;
  return true;
}

function render() {
  const active = goals.filter(g => !isFullyAchieved(g)).sort((a,b) => (b.importance||5)-(a.importance||5));
  const done   = goals.filter(g =>  isFullyAchieved(g)).sort((a,b) => (b.importance||5)-(a.importance||5));

  document.getElementById('stat-pill').innerHTML =
    `<b>${active.length}</b> goals · <b>${done.length}</b> done`;

  document.getElementById('g-grid').style.display         = tab === 'g' ? '' : 'none';
  document.getElementById('completed-wrap').style.display = tab === 'c' ? '' : 'none';

  document.getElementById('g-grid').innerHTML =
    active.length ? active.map(card).join('') : `<div class="empty">no goals yet</div>`;
  document.getElementById('c-grid').innerHTML =
    done.length ? done.map(card).join('') : `<div class="empty">nothing completed yet</div>`;
}

function card(g) {
  const imp = g.importance || 5;
  const ic  = imp >= 8 ? 'hi' : imp >= 5 ? 'md' : '';

  // partial = achieved checkbox ticked but not all fields done
  const isPartial = g.achieved && !isFullyAchieved(g);

  const chips = [];
  if (g.goalAcc) {
    const hit = g.achieved && g.achievedAcc !== false;
    chips.push(`<span class="chip${hit ? ' done' : isPartial ? ' partial' : ''}">ACC ${esc(g.goalAcc)}</span>`);
  }
  if (g.goalGrade) {
    const hit = g.achieved && g.achievedGrade !== false;
    chips.push(`<span class="chip${hit ? ' done' : isPartial ? ' partial' : ''}">GRADE ${esc(g.goalGrade)}</span>`);
  }
  if (g.goalPp) {
    const hit = g.achieved && g.achievedPp !== false;
    chips.push(`<span class="chip${hit ? ' done' : isPartial ? ' partial' : ''}">PP ${esc(g.goalPp)}</span>`);
  }
  if (!chips.length) chips.push(`<span class="chip empty">no targets set</span>`);

  const starsLabel = (g.mods && g.modSr) ? `${g.modSr}*` : (g.stars || null);
  return `<div class="card${isPartial ? ' partial' : ''}">
    <div class="card-thumb">
      ${g.cover
        ? `<div class="card-thumb-img" style="background-image:url('${g.cover}')"></div>`
        : `<div class="card-thumb-empty"></div>`}
      <div class="card-thumb-overlay">
        <span class="imp ${ic}">${imp}</span>
        <div class="card-tools">
          <button class="card-tool" onclick="openEdit('${g.id}')">edit</button>
          <button class="card-tool x" onclick="delGoal('${g.id}')">✕</button>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-titles">
        <a class="card-title" href="${esc(g.url)}" target="_blank" rel="noopener">${esc(g.title)}</a>
        ${g.artist ? `<div class="card-artist">${esc(g.artist)}</div>` : ''}
      </div>
      ${(g.diff || starsLabel || g.mods) ? `<div class="card-diff">
        ${g.diff ? `<span>${esc(g.diff)}</span>` : ''}
        ${starsLabel ? `<span class="stars"><b>★</b> ${esc(starsLabel)}</span>` : ''}
        ${g.mods ? `<span class="mod-tag">${esc(g.mods)}</span>` : ''}
        ${isPartial ? `<span class="partial-tag">partial</span>` : ''}
      </div>` : (isPartial ? `<div class="card-diff"><span class="partial-tag">partial</span></div>` : '')}
      <div class="chips">${chips.join('')}</div>
      ${g.notes ? `<div class="card-note">${esc(g.notes)}</div>` : ''}
    </div>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastT = null;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.className = '', 2600);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  applyAuthUI();
  await fetchGoals();
  render();
}

document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// enter key in password field
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitLogin();
  });
});

init();
</script>
